databases:
  - name: moodify-db
    databaseName: moodify
    user: moodify_user
    plan: free

services:
  # Frontend — static site is FREE on Render
  - type: web
    name: moodify-frontend
    runtime: static
    staticPublishPath: ./moodify-frontend/dist
    buildCommand: cd moodify-frontend && npm install && npm run build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://moodify-backend.up.railway.app
